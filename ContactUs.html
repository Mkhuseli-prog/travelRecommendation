<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - TRAVEL AGENCY</title>
    <link rel="stylesheet" href="travel_recommendation.css">
    <link rel="stylesheet" href="https://cloudflare.com">
</head>

<body>

    <nav class="navbar">
        <div class="logo-container">
            <!-- Replace 'logo.png' with your actual logo file name -->
            <a href="index.html">
                <img src="_Black And Blue Modern Typography Travel Agency Logo.png" alt="TravelBloom Logo" class="site-logo">
            </a>
            <span class="site-title">TRAVEL AGENCY</span>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="AboutUs.html">About Us</a></li>
            <li><a href="ContactUs.html">Contact Us</a></li>
        </ul>
        <div class="search-container">
            
        </div>
    </nav>

    <div class="social-sidebar">
        <a href="#"><i class="fab fa-twitter"></i></a>
        <a href="#"><i class="fab fa-facebook-f"></i></a>
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="#"><i class="fab fa-youtube"></i></a>
    </div>

    <main class="contact-container">
        <div class="contact-info">
            <h1>CONTACT US</h1>
            <p>Get in touch</p>
        </div>

        <form class="contact-form" id="contactForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="Enter your name" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <!-- The 'required' and 'type="email"' do the heavy lifting here -->
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label>Message</label>
                <textarea id="message" rows="5" placeholder="Enter your message" required minlength="10"></textarea>
            </div>
            <button type="submit" class="btn-submit">Submit</button>
        </form>

    </main>
    <script src="travel_recommendation.js"></script>

</body>

</html>
